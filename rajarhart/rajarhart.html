<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Key Estates | Zone</title>

  <link rel="stylesheet" href="rajarhart.css">
<script src="rajarhart.js"></script>
</head>

<body>

<div class="container">

  <!-- TOP SECTION -->
  <div class="zone-top">
    <div class="zone-image">
      <img id="zoneImage">
    </div>

    <div class="zone-content">
      <h1 id="zoneTitle"></h1>
      <p id="zoneDesc"></p>
    </div>
  </div>

  <!-- MAP -->
  <div class="map-box">
    <iframe id="mapFrame" loading="lazy"></iframe>
  </div>

</div>

<!-- LOCALITIES -->
<div class="section-bg">

  <div class="container">
    <h2>Popular Localities in <span id="zoneName2"></span></h2>
    <p class="subtext">Browse trending projects in popular hotspots</p>

    <div class="local-grid" id="localGrid"></div>
  </div>

</div>

<script src="rajarhart.js"></script>
</body>
</html>
