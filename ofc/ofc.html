<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Key Estates</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <h2>Popular Zones</h2>

  <div class="zones-grid">

    <div class="zone-card" onclick="goToZone('New Town')">
      <h3>New Town</h3>
    </div>

    <div class="zone-card" onclick="goToZone('EM Bypass')">
      <h3>EM Bypass</h3>
    </div>

    <div class="zone-card" onclick="goToZone('Rajarhat')">
      <h3>Rajarhat</h3>
    </div>

    <div class="zone-card" onclick="goToZone('Sector V')">
      <h3>Sector V</h3>
    </div>

  </div>
</div>

<script>
function goToZone(zone) {
  window.location.href = "projects.html?zone=" + encodeURIComponent(zone);
}
</script>

</body>
</html>
